<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ribbon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    .ribbon-wrapper {
      position: fixed;
      top: 0;
      right: 0;
      width: 60%;
      height: 100%;
      overflow: hidden;
    }

    #gradient-canvas {
      display: block;
      width: 100%;
      height: 100%;
      --gradient-color-1: #f97316;
      --gradient-color-2: #fb923c;
      --gradient-color-3: #e879f9;
      --gradient-color-4: #c026d3;
    }
  </style>
</head>
<body>

  <div class="ribbon-wrapper">
    <canvas id="gradient-canvas"></canvas>
  </div>

  <script src="./js/gradient.js"></script>
  <script>
    const gradient = new Gradient();
    gradient.initGradient('#gradient-canvas');
  </script>

</body>
</html>
