<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ribbon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    .ribbon-wrap {
      position: fixed;
      top: 0;
      right: 0;
      width: 62%;
      height: 100%;
    }

    #wave-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="ribbon-wrap">
    <canvas id="wave-canvas"></canvas>
  </div>

  <script src="./js/three.min.js"></script>
  <script src="./js/wave.js"></script>

</body>
</html>
